<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#f4f4f4">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Panel</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://kit.fontawesome.com/4dd5c549ad.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      const theme = localStorage.getItem('theme-preference') || 'auto';
      if (theme !== 'auto') document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div id="boot-spinner">
    <div class="boot-spinner-ring"></div>
  </div>

  <div id="app-loading">
    <div class="skel-topbar"></div>
    <div class="skel-shell-body">
      <div class="skel-sidebar">
        <div class="skeleton skeleton-course-item" style="height:38px"></div>
        <div class="skeleton skeleton-course-item" style="margin-top:18px"></div>
        <div class="skeleton skeleton-course-item"></div>
        <div class="skeleton skeleton-course-item"></div>
        <div class="skeleton skeleton-course-item"></div>
      </div>
      <div class="skel-main">
        <div class="skel-main-inner">
          <div class="skel-tabs-row">
            <div class="skeleton skeleton-tab"></div>
            <div class="skeleton skeleton-tab"></div>
            <div class="skeleton skeleton-tab"></div>
            <div class="skeleton skeleton-tab"></div>
          </div>
          <div class="skeleton skeleton-course-header"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="login-screen">
    <div class="login-inner">
      <h1 class="login-title">Control Panel</h1>
      <p class="login-sub">Please sign in with your <strong>EPOKA Mail</strong> to access your courses.</p>
      <button class="btn-google" id="signin-btn" onclick="signIn()">
        <svg class="google-icon" viewBox="0 0 18 18">
          <path
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
            fill="#4285F4" />
          <path
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
            fill="#34A853" />
          <path
            d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
            fill="#FBBC05" />
          <path
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
            fill="#EA4335" />
        </svg>
        Sign in
      </button>
    </div>
  </div>

  <div id="error-screen">
    <div class="error-card">
      <h2>Access Denied</h2>
      <p id="error-msg">Your account is not in the admin list.</p>
      <button class="btn-secondary" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"
          style="margin-right:6px"></i>Sign out and try another account</button>
    </div>
  </div>

  <div id="admin-app">
    <div class="top-bar">
      <button class="hamburger" id="desktop-hamburger" onclick="toggleSidebar()" aria-label="Toggle course list"
        title="Toggle course list">
        <span></span><span></span><span></span>
      </button>
      <span class="top-bar-title"><i class="fa-solid fa-screwdriver-wrench"
          style="margin-right:8px;opacity:0.85;font-size:0.9em"></i><span class="top-bar-title-text">Control
          Panel</span></span>
      <span class="top-bar-user" id="top-user"></span>
      <button class="btn-ghost btn-sm" id="signout-btn" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"
          style="margin-right:5px"></i><span class="signout-text">Sign out</span></button>
    </div>
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button onclick="openNewCourseModal()"
          style="width:100%;border-radius:12px;font-size:0.875em;padding:10px 16px;justify-content:center;display:flex;align-items:center"><i
            class="fa-solid fa-plus" style="margin-right:7px"></i>New Course</button>
      </div>
      <div class="sidebar-scroll">
        <div class="sidebar-label"><i class="fa-solid fa-circle" style="color:#43a047;font-size:0.65em"></i>Active
        </div>
        <div id="sb-active">
          <div class="skeleton skeleton-course-item"></div>
          <div class="skeleton skeleton-course-item"></div>
          <div class="skeleton skeleton-course-item"></div>
        </div>
        <button type="button" class="sidebar-label sidebar-label-toggle" id="sb-archive-toggle"
          onclick="toggleArchiveGroup()">
          <i class="fa-solid fa-box-archive" style="font-size:0.8em"></i>Archived
          <i class="fa-solid fa-chevron-down sb-archive-chevron" id="sb-archive-chevron"></i>
        </button>
        <div id="sb-archive" class="sb-archive-collapsed"></div>
      </div>
    </aside>
    <button id="sidebar-fab" class="sidebar-fab" onclick="toggleSidebar()" title="Course list"
      aria-label="Toggle course list">
      <i class="fa-solid fa-graduation-cap"></i>
    </button>
    <main class="main-area" id="main-area">
      <div class="no-course">
        <div>
          <i class="fa-solid fa-book-open" style="font-size:3em;color:#e0e0e0"></i>
          <h3>No course selected</h3>
          <p>Choose a course from the sidebar or create a new one.</p>
        </div>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div class="social-links">
      <a href="../" rel="noopener noreferrer"><i class="fa-solid fa-arrow-left" title="Back"></i></a>
      <a href="../../" rel="noopener noreferrer"><i class="fa-solid fa-house" title="Home"></i></a>
      <a href="https://eis.epoka.edu.al/cv/fullcv/655" target="_blank" rel="noopener noreferrer"><i
          class="fa-solid fa-id-card" title="Curriculum Vitae"></i></a>
      <a href="mailto:bplaku@epoka.edu.al" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-envelope"
          title="Contact Email"></i></a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Theme: Auto" title="Theme: Auto">
        <i id="theme-toggle-icon" class="fa-solid fa-adjust" aria-hidden="true"></i>
      </button>
    </div>
    <p style="font-size:0.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 700;">
      <i class="fa-regular fa-copyright"></i> 2023-<span id="currentYear"></span> Bredli Plaku. All Rights Reserved.
    </p>
  </footer>

  <div class="modal-overlay" id="modal-overlay" onmousedown="_overlayMD=event.target===this"
    onclick="if(_overlayMD&&event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">Edit</h3>
        <button class="btn-ghost btn-icon" onclick="closeModal()" style="margin-left:auto;padding:5px 9px;"><i
            class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot" id="modal-foot">
        <button class="btn-secondary btn-sm" onclick="closeModal()"><i class="fa-solid fa-xmark"
            style="margin-right:5px"></i>Cancel</button>
        <button class="btn-sm" id="modal-save" onclick="modalSave()"><i class="fa-solid fa-check"
            style="margin-right:5px"></i>Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-overlay" onmousedown="_confirmOverlayMD=event.target===this"
    onclick="if(_confirmOverlayMD&&event.target===this)_resolveConfirm(false)">
    <div class="modal confirm-modal">
      <div class="modal-head">
        <h3 id="confirm-title">Please Confirm</h3>
      </div>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-foot">
        <button class="btn-secondary btn-sm" onclick="_resolveConfirm(false)"><i class="fa-solid fa-xmark"
            style="margin-right:5px"></i>Cancel</button>
        <button class="btn-secondary btn-sm" id="confirm-alt-btn" style="display:none"
          onclick="_resolveConfirm('alt')"></button>
        <button class="btn-sm" id="confirm-ok-btn" onclick="_resolveConfirm(true)"><i class="fa-solid fa-check"
            style="margin-right:5px"></i>Confirm</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Google Identity Services — used only for One Tap sign-in (ID token → Supabase).
       The onload hook re-triggers One Tap if the login screen appeared before this loaded. -->
  <script src="https://accounts.google.com/gsi/client" async defer
    onload="window._gsiOnLoad && window._gsiOnLoad()"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.4/Sortable.min.js"></script>
  <script src="js/scripts.js"></script>
</body>

</html>
