    async function saveProjectGroup() {
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:5px"></i>Saving…';
      const row = {
        row_uid: document.getElementById('m_uid').value,
        sheet_name: document.getElementById('m_sheet').value,
        is_archive: document.getElementById('m_archive').value === 'true',
        row_index: parseInt(document.getElementById('m_index').value),
        type: 'project_group',
        b: document.getElementById('mf_b').value.trim(),
        c: document.getElementById('mf_c').value.trim(),
        d: document.getElementById('mf_d').value.trim(),
        e: '', f: '', g: '', h: '', i: '', j: ''
      };
      const members = [...document.querySelectorAll('#members-list .member-input')]
        .map(inp => inp.value.trim()).filter(Boolean);
      row.e = members[0] || '';
      row.f = members[1] || '';
      row.g = members[2] || '';
      row.h = members[3] || '';
      row.i = members.slice(4).join(',');
      const { error } = await sb.from('course_rows').upsert(row, { onConflict: 'row_uid' });
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:5px"></i>Save';
      if (error) { toast('Save failed: ' + error.message, 'err'); return; }
      ROW_STORE[row.row_uid] = row;
      toast('Saved', 'ok'); closeModal();
      await loadSection(S.section);
    }

    async function modalSave() {
      const btn = document.getElementById('modal-save');
      btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:5px"></i>Saving…';
      const type = document.getElementById('m_type').value;
      const row = {
        row_uid: document.getElementById('m_uid').value,
        sheet_name: document.getElementById('m_sheet').value,
        is_archive: document.getElementById('m_archive').value === 'true',
        row_index: parseInt(document.getElementById('m_index').value),
        type: type === '_custom' ? 'metadata' : type,
        b: '', c: '', d: '', e: '', f: '', g: '', h: '', i: '', j: ''
      };
      for (const f of (FIELDS[type] || [])) {
        const el = document.getElementById('mf_' + f.col);
        if (!el) continue;
        row[f.col] = f.dt && el.value ? fromIsoDatetime(el.value) : (el.value || '');
      }
      const { error } = await sb.from('course_rows').upsert(row, { onConflict: 'row_uid' });
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:5px"></i>Save';
      if (error) { toast('Save failed: ' + error.message, 'err'); return; }
      ROW_STORE[row.row_uid] = row;
      toast('Saved', 'ok'); closeModal();
      if (S.section === 'info') await loadMetadataSettings();
      else await loadSection(S.section);

    async function deleteRow(uid) {
      if (!confirm('Delete this row?')) return;
      const { error } = await sb.from('course_rows').delete().eq('row_uid', uid);
      if (error) { toast('Delete failed: ' + error.message, 'err'); return; }
      delete ROW_STORE[uid]; toast('Deleted', 'ok');
      if (S.section === 'info') await loadMetadataSettings();
      else await loadSection(S.section);

    async function moveRow(uid, dir) {
      const sec = SECTIONS.find(s => s.id === S.section);
      if (!sec) return;
      const { data } = await sb.from('course_rows').select('row_uid,row_index')
        .eq('sheet_name', S.course).eq('is_archive', S.isArchive)
        .in('type', sec.types).order('row_index');
      if (!data) return;
      const i = data.findIndex(r => r.row_uid === uid), j = i + dir;
      if (j < 0 || j >= data.length) return;
      await sb.from('course_rows').update({ row_index: data[j].row_index }).eq('row_uid', data[i].row_uid);
      await sb.from('course_rows').update({ row_index: data[i].row_index }).eq('row_uid', data[j].row_uid);
      await loadSection(S.section);
    }

    async function createCourse() {
      const sheet = document.getElementById('nc_sheet').value.trim();
      const code = document.getElementById('nc_code').value.trim();
      const title = document.getElementById('nc_title').value.trim();
      const year = document.getElementById('nc_year').value.trim();
      const sem = document.getElementById('nc_sem').value.trim();
      const archive = document.getElementById('nc_archive').value === 'true';
      if (!sheet) { toast('Sheet name is required', 'err'); return; }
      const btn = document.getElementById('modal-save'); btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:5px"></i>Creating…';
      const base = { sheet_name: sheet, is_archive: archive, type: 'metadata', b: '', c: '', d: '', e: '', f: '', g: '', h: '', i: '', j: '' };
      const rows = [];
      if (code) rows.push({ ...base, row_uid: sheet + ':10', row_index: 10, b: 'code', c: code });
      if (title) rows.push({ ...base, row_uid: sheet + ':20', row_index: 20, b: 'title', c: title });
      if (year) rows.push({ ...base, row_uid: sheet + ':25', row_index: 25, b: 'year', c: year });
      if (sem) rows.push({ ...base, row_uid: sheet + ':30', row_index: 30, b: 'semester', c: sem });
      if (!rows.length) rows.push({ ...base, row_uid: sheet + ':10', row_index: 10, b: 'code', c: sheet });
      const { error } = await sb.from('course_rows').insert(rows);
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus" style="margin-right:5px"></i>Create';
      if (error) { toast('Create failed: ' + error.message, 'err'); return; }
      document.getElementById('modal-save').onclick = modalSave;
      closeModal(); toast('Course created', 'ok');
      await loadSidebar();
      S.course = sheet; S.isArchive = archive; S.section = 'info';
      renderCourseShell(sheet, archive);
      await loadSidebar();
    }

    function setupThemeToggle() {
      const KEY = 'theme-preference';
      const icons = { auto: 'fa-solid fa-adjust', light: 'fa-regular fa-sun', dark: 'fa-regular fa-moon' };
      const getSaved = () => localStorage.getItem(KEY) || 'auto';
      const currentIsDark = () => {
        const forced = document.documentElement.getAttribute('data-theme');
        if (forced) return forced === 'dark';
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      };
      const updateThemeColorMeta = () => {
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', currentIsDark() ? '#000000' : '#f4f4f4');
      };
      const updateUI = (pref) => {
        const oldIcon = document.getElementById('theme-toggle-icon');
        if (oldIcon) {
          const i = document.createElement('i');
          i.id = 'theme-toggle-icon';
          i.className = icons[pref] || icons.auto;
          i.setAttribute('aria-hidden', 'true');
          oldIcon.replaceWith(i);
        }
        const btn = document.getElementById('theme-toggle');
        if (btn) {
          const label = pref.charAt(0).toUpperCase() + pref.slice(1);
          btn.setAttribute('aria-label', `Theme: ${label}`);
          btn.title = `Theme: ${label}`;
        }
      };
      const applyTheme = (pref) => {
        const html = document.documentElement;
        if (pref === 'auto') html.removeAttribute('data-theme');
        else html.setAttribute('data-theme', pref);
        localStorage.setItem(KEY, pref);
        updateUI(pref);
        updateThemeColorMeta();
      };
      applyTheme(getSaved());
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', () => {
          const cur = getSaved();
          const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          applyTheme(cur === 'auto' ? (isSystemDark ? 'light' : 'dark') : 'auto');
        });
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (getSaved() === 'auto') applyTheme('auto');
      });
    }

    const _yr = document.getElementById('currentYear');
    if (_yr) _yr.textContent = new Date().getFullYear();
    setupThemeToggle();

    // ─────────────────────────────────────────────────────────────────────────────
    // Send Notification
    // ─────────────────────────────────────────────────────────────────────────────

    function openSendNotifModal() {
      document.getElementById('modal-title').innerHTML = '<i class="fa-regular fa-bell" style="margin-right:8px;opacity:0.8"></i>Send Notification';
      document.getElementById('modal-save').innerHTML = '<i class="fa-solid fa-paper-plane" style="margin-right:5px"></i>Send';
      document.getElementById('modal-save').onclick = sendNotifFromModal;
      document.getElementById('modal-foot').style.display = '';
      document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label class="form-label"><i class="fa-solid fa-heading" style="margin-right:5px;opacity:0.6"></i>Title *</label>
      <input type="text" id="snf_title">
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-solid fa-align-left" style="margin-right:5px;opacity:0.6"></i>Body *</label>
      <textarea id="snf_text" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-regular fa-image" style="margin-right:5px;opacity:0.6"></i>Icon <span class="form-hint" style="display:inline">(URL or FA class)</span></label>
      <input type="text" id="snf_icon">
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-solid fa-image" style="margin-right:5px;opacity:0.6"></i>Image Banner URL</label>
      <input type="text" id="snf_image">
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-regular fa-image" style="margin-right:5px;opacity:0.6"></i>Badge URL <span class="form-hint" style="display:inline">(mono 72×72)</span></label>
      <input type="text" id="snf_badge">
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-solid fa-tag" style="margin-right:5px;opacity:0.6"></i>Tag</label>
      <input type="text" id="snf_tag">
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-regular fa-hand-pointer" style="margin-right:5px;opacity:0.6"></i>Require Interaction</label>
      <select id="snf_ri"><option value="FALSE">No</option><option value="TRUE">Yes</option></select>
    </div>
    <div class="form-group">
      <label class="form-label"><i class="fa-solid fa-code" style="margin-right:5px;opacity:0.6"></i>Action Buttons</label>
      <textarea id="snf_actions" rows="2"></textarea>
      <div class="form-hint">Format: Label|URL, Label|URL &nbsp;·&nbsp; Use <code>close</code> as URL to dismiss</div>
    </div>
      `;
      document.getElementById('modal-overlay').classList.add('open');
    }

    async function sendNotifFromModal() {
      const btn = document.getElementById('modal-save');
      const title = (document.getElementById('snf_title')?.value || '').trim();
      const text = (document.getElementById('snf_text')?.value || '').trim();
      if (!title || !text) { toast('Title and body are required', 'err'); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:5px"></i>Sending…';

      try {
        const session = (await sb.auth.getSession()).data.session;
        if (!session) throw new Error('Not authenticated');

        const res = await fetch(`${SUPABASE_URL}/functions/v1/send-fcm`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            course: S.course,
            title,
            text,
            icon: (document.getElementById('snf_icon')?.value || '').trim(),
            image: (document.getElementById('snf_image')?.value || '').trim(),
            badge: (document.getElementById('snf_badge')?.value || '').trim(),
            tag: (document.getElementById('snf_tag')?.value || '').trim(),
            requireInteraction: document.getElementById('snf_ri')?.value || 'FALSE',
            actions: (document.getElementById('snf_actions')?.value || '').trim(),
          }),
        });

        const result = await res.json();
        if (!res.ok) throw new Error(result.error || `HTTP ${res.status}`);

        // Record the notification in course_rows
        const { data: maxRow } = await sb.from('course_rows').select('row_index')
          .eq('sheet_name', S.course).eq('is_archive', S.isArchive)
          .order('row_index', { ascending: false }).limit(1);
        const idx = (maxRow?.[0]?.row_index || 0) + 10;
        await sb.from('course_rows').insert({
          row_uid: `${S.course}:notif_${Date.now()}`,
          sheet_name: S.course, is_archive: S.isArchive,
          row_index: idx, type: 'send_notification',
          b: title, c: text,
          d: (document.getElementById('snf_icon')?.value || '').trim(),
          e: (document.getElementById('snf_image')?.value || '').trim(),
          f: (document.getElementById('snf_badge')?.value || '').trim(),
          g: (document.getElementById('snf_tag')?.value || '').trim(),
          h: document.getElementById('snf_ri')?.value || 'FALSE',
          i: (document.getElementById('snf_actions')?.value || '').trim(),
          j: `Sent ✓ (${result.sent})`,
        });

        toast(`Sent to ${result.sent} subscriber${result.sent !== 1 ? 's' : ''} (${result.total} total)`, 'ok');
        closeModal();
        await loadSection(S.section);
      } catch (err) {
        toast('Error: ' + (err && err.message ? err.message : String(err)), 'err');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane" style="margin-right:5px"></i>Send';
      }
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Drag & Drop
    // ─────────────────────────────────────────────────────────────────────────────

    const DND_OPTS = {
      animation: 180,
      handle: '.drag-handle',
      ghostClass: 'dnd-ghost',
      chosenClass: 'dnd-chosen',
      forceFallback: true,
      delay: 250,
      delayOnTouchOnly: true,
      touchStartThreshold: 5,
    };

    function initDnD(sec) {
      if (!sec || !window.Sortable) return;
      const body = document.getElementById('section-body');
      if (!body) return;

      if (sec.hier) {
        // Top level: sort .module blocks as whole units
        const modules = body.querySelectorAll(':scope > .module[data-uid]');
        if (modules.length > 1) {
          Sortable.create(body, {
            ...DND_OPTS,
            filter: '.add-bar, .empty-content',
            onEnd(evt) {
              if (evt.oldIndex === evt.newIndex) return;
              const allUids = [];
              body.querySelectorAll(':scope > .module[data-uid]').forEach(modEl => {
                allUids.push(modEl.dataset.uid);
                const kids = modEl.dataset.childUids;
                if (kids) allUids.push(...kids.split(',').filter(Boolean));
              });
              persistDnDOrder(allUids);
            }
          });
        }
        // Inner level: sort materials/funfacts within each module
        body.querySelectorAll('.module-content').forEach(mc => {
          const items = mc.querySelectorAll(':scope > [data-uid]');
          if (items.length < 2) return;
          const modEl = mc.closest('.module[data-uid]');
          Sortable.create(mc, {
            ...DND_OPTS,
            filter: '.empty-content',
            onEnd(evt) {
              if (evt.oldIndex === evt.newIndex) return;
              const uids = [...mc.querySelectorAll(':scope > [data-uid]')].map(el => el.dataset.uid);
              if (modEl) modEl.dataset.childUids = uids.join(',');
              persistDnDOrder(uids);
            }
          });
        });
      } else if (sec.proj) {
        // Top level: sort project .module blocks
        const modules = body.querySelectorAll(':scope > .module[data-uid]');
        if (modules.length > 1) {
          Sortable.create(body, {
            ...DND_OPTS,
            filter: '.add-bar, .empty-content',
            onEnd(evt) {
              if (evt.oldIndex === evt.newIndex) return;
              const uids = [...body.querySelectorAll(':scope > .module[data-uid]')].map(el => el.dataset.uid);
              persistDnDOrder(uids);
            }
          });
        }
      } else {
        // Simple flat list of material-cards
        const cards = body.querySelectorAll(':scope > .material-card[data-uid]');
        if (cards.length > 1) {
          Sortable.create(body, {
            ...DND_OPTS,
            filter: '.add-bar, .empty-content',
            onEnd(evt) {
              if (evt.oldIndex === evt.newIndex) return;
              const uids = [...body.querySelectorAll(':scope > .material-card[data-uid]')].map(el => el.dataset.uid);
              persistDnDOrder(uids);
            }
          });
        }
      }
    }

    async function persistDnDOrder(uids) {
      const entries = uids.map(uid => ({ uid, row: ROW_STORE[uid] })).filter(e => e.row);
      if (entries.length < 2) return;
      const sortedIdxs = entries.map(e => e.row.row_index).sort((a, b) => a - b);
      const updates = entries.map((e, i) => ({ ...e.row, row_index: sortedIdxs[i] }));
      for (const row of updates) ROW_STORE[row.row_uid] = row;
      const { error } = await sb.from('course_rows').upsert(updates, { onConflict: 'row_uid' });
      if (error) toast('Reorder failed: ' + error.message, 'err');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Utilities
    // ─────────────────────────────────────────────────────────────────────────────

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.getElementById('modal-foot').style.display = '';
    }

    function x(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function xh(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    let _tt;
    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
    }
  </script>
</body>
